<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav's Unplugged</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Rock+Salt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CORE THEME --- */
        body { margin: 0; padding: 0; background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; animation: entranceFade 1.2s forwards; }
        @keyframes entranceFade { to { opacity: 1; } }
        
        .stage-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('stage_bg.jpg') no-repeat center center/cover; filter: brightness(0.3); z-index: -2; }
        .spotlight { position: fixed; top: -50%; left: 50%; width: 200px; height: 150vh; background: linear-gradient(to bottom, rgba(255, 215, 0, 0.2), transparent); transform: translateX(-50%); filter: blur(30px); z-index: -1; pointer-events: none; }
        .crowd-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 30vh; z-index: -1; pointer-events: none; }
        .flashlight { position: absolute; bottom: 0; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8); opacity: 0; animation: waveLight 4s infinite alternate; }
        @keyframes waveLight { 50% { opacity: 0.8; transform: translateY(-10px); } }

        /* --- MAIN LAYOUT --- */
        .app-container {
            display: flex; width: 95%; max-width: 1200px; height: 85vh;
            background: rgba(20, 20, 20, 0.85); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* --- LEFT PANEL: LIBRARY --- */
        .library-panel {
            flex: 1; padding: 20px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .header-title { font-family: 'Rock Salt', cursive; color: #FFD700; font-size: 1.2rem; margin-bottom: 5px; text-align: center; }
        .header-subtitle { text-align: center; color: #888; font-size: 0.7rem; margin-bottom: 20px; }
        .search-box { width: 100%; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-family: 'Montserrat', sans-serif; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: #FFD700; background: rgba(0,0,0,0.3); }

        .song-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; scrollbar-width: thin; scrollbar-color: #FFD700 rgba(0,0,0,0.3); }
        .song-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 15px; border-radius: 8px; transition: 0.2s; }
        .song-item:hover { background: rgba(255, 215, 0, 0.1); }
        .song-item.active { background: linear-gradient(90deg, rgba(255, 215, 0, 0.15), transparent); border-left: 4px solid #FFD700; }
        
        .song-thumb { width: 45px; height: 45px; background: #333; border-radius: 6px; object-fit: cover; border: none; }
        .song-info h4 { margin: 0; font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;}
        .song-info p { margin: 0; font-size: 0.75rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;}

        /* --- RIGHT PANEL: PLAYER --- */
        .player-panel {
            flex: 1.5; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background: radial-gradient(circle at center, rgba(30,30,30,0.8), rgba(10,10,10,0.95));
            position: relative; overflow: hidden; transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .now-playing-art { 
            width: 160px; height: 160px; border-radius: 15px; margin-top: 20px; object-fit: cover;
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.3)); 
            animation: float 6s ease-in-out infinite; border: 2px solid rgba(255, 215, 0, 0.2);
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .now-playing-info { text-align: center; margin: 20px 0; position: relative; z-index: 10; width: 100%; }
        .now-playing-title { font-size: 1.5rem; font-weight: 700; color: #FFD700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 20px;}
        .now-playing-artist { font-size: 1rem; color: #aaa; margin: 5px 0 0 0; }

        /* --- NEW CONTROLS (Play, Pause, Progress) --- */
        .controls-container { width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; z-index: 10;}
        
        .progress-area { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #aaa; }
        .progress-bar { 
            flex-grow: 1; -webkit-appearance: none; height: 5px; background: rgba(255,255,255,0.1); 
            border-radius: 5px; outline: none; cursor: pointer; overflow: hidden;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: #FFD700; box-shadow: -400px 0 0 400px rgba(255, 215, 0, 0.5); cursor: pointer;
        }

        .buttons-area { display: flex; align-items: center; gap: 25px; }
        .ctrl-btn { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { color: #FFD700; transform: scale(1.1); }
        .play-btn { 
            background: #FFD700; color: #000; width: 50px; height: 50px; 
            border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .play-btn:hover { background: #fff; color: #000; box-shadow: 0 0 25px rgba(255,255,255,0.6); }

        .lyrics-box {
            width: 100%; height: 60px; text-align: center; z-index: 5;
            display: flex; align-items: center; justify-content: center;
        }
        .lyric-line { font-size: 1.1rem; color: rgba(255, 255, 255, 0.6); transition: all 0.4s ease; font-style: italic;}
        .lyric-line.active { font-size: 1.3rem; color: #fff; font-weight: 700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }

        /* --- BUTTONS --- */
        .exit-btn {
            position: fixed; top: 15px; right: 15px; z-index: 10001;
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px;
        }

        .nav-btn {
            position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,215,0,0.5); 
            color: #FFD700; padding: 8px 16px; border-radius: 30px; cursor: pointer; z-index: 10002; font-size: 0.9rem; 
            display: none; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .nav-btn.show { display: flex !important; }

        /* --- MOBILE FIXES --- */
        @media (max-width: 768px) {
            .app-container { border: none; width: 100%; height: 100vh; border-radius: 0; background: transparent; }
            .library-panel { width: 100%; border: none; padding-top: 50px; background: rgba(20, 20, 20, 0.95); } 
            .player-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; transform: translateY(100%); opacity: 0; padding-top: 50px; box-sizing: border-box; background: #111; }
            .player-panel.active { transform: translateY(0); opacity: 1; }
            .now-playing-art { width: 200px; height: 200px; margin-top: 40px; }
        }
    </style>
</head>
<body>
    <div class="stage-bg"></div>
    <div class="spotlight"></div>
    <div class="crowd-container" id="crowd-lights"></div>

    <audio id="audio-player"></audio>

    <a href="index.html" class="exit-btn">EXIT</a>
    <button class="nav-btn" id="back-to-songs-btn">
        <i class="fas fa-arrow-left"></i> SONGS
    </button>

    <div class="app-container">
        
        <div class="library-panel" id="library-panel">
            <div class="header-title">ARNAV'S UNPLUGGED</div>
            <div class="header-subtitle">Powered by JioSaavn API</div>
            
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="Search any song or artist...">
            </div>

            <ul class="song-list" id="song-list-container">
                </ul>
        </div>

        <div class="player-panel" id="player-panel">
            <img src="guitarist.png" class="now-playing-art" id="np-art">
            
            <div class="now-playing-info">
                <h2 class="now-playing-title" id="np-title">Search a Vibe</h2>
                <p class="now-playing-artist" id="np-artist">To start playing</p>
            </div>

            <div class="lyrics-box" id="lyrics-display">
                <div class="lyric-line active" id="vibe-text">Waiting to drop the beat... ✨</div>
            </div>

            <div class="controls-container">
                <div class="progress-area">
                    <span id="curr-time">0:00</span>
                    <input type="range" id="seek-bar" class="progress-bar" value="0" min="0" max="100" step="1">
                    <span id="total-time">0:00</span>
                </div>
                
                <div class="buttons-area">
                    <button class="ctrl-btn" id="prev-btn"><i class="fas fa-step-backward"></i></button>
                    <button class="ctrl-btn play-btn" id="play-pause-btn"><i class="fas fa-play" id="play-icon"></i></button>
                    <button class="ctrl-btn" id="next-btn"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>

        </div>

    </div>

    <script src="concert.js"></script>
</body>
</html>
